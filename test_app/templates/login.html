{% extends "base.html" %}
{% block title %}Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <h2 class="text-center mb-4" id="login-title">Login</h2>
        {% if error %}
        <div class="alert alert-danger" id="login-error">{{ error }}</div>
        {% endif %}
        <form method="POST" action="/login" id="login-form">
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Enter username" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Enter password" required>
            </div>
            <div class="mb-3 form-check">
                <input type="checkbox" class="form-check-input" id="remember-me" name="remember">
                <label class="form-check-label" for="remember-me">Remember me</label>
            </div>
            <button type="submit" class="btn btn-primary w-100" id="login-btn">Login</button>
        </form>
        <p class="text-center mt-3">
            Don't have an account? <a href="/register" id="register-link">Register here</a>
        </p>
        <p class="text-center text-muted small">
            Demo: <code>testuser</code> / <code>password123</code>
        </p>
    </div>
</div>
{% endblock %}
