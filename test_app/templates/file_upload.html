{% extends "base.html" %}
{% block title %}File Upload{% endblock %}
{% block content %}
<h2 id="upload-title">File Upload</h2>
<div class="row justify-content-center">
    <div class="col-md-6">
        {% if message %}
        <div class="alert alert-info" id="upload-message">{{ message }}</div>
        {% endif %}
        <form method="POST" action="/file-upload" enctype="multipart/form-data" id="upload-form">
            <div class="mb-3">
                <label for="file" class="form-label">Choose a file to upload</label>
                <input type="file" class="form-control" id="file" name="file" required>
            </div>
            <button type="submit" class="btn btn-primary" id="upload-btn">Upload</button>
        </form>
    </div>
</div>
{% endblock %}
