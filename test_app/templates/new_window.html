<!DOCTYPE html>
<html>
<head>
    <title>New Window</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
    <h3 id="new-window-title">This is a New Window</h3>
    <p id="new-window-text">This content appears in a separate window/tab. Practice switching window handles in Selenium.</p>
    <p>Window Title: <strong id="window-title-display">New Window</strong></p>
    <button class="btn btn-danger" id="close-window-btn" onclick="window.close()">Close This Window</button>
</body>
</html>
