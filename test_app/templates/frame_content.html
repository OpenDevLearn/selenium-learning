<!DOCTYPE html>
<html>
<head>
    <title>Frame Content</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-3">
    <h4 id="frame-title">Inside iFrame</h4>
    <p id="frame-text">This content is inside an iFrame. Selenium needs to switch to this frame to interact with it.</p>
    <button class="btn btn-primary" id="frame-btn" onclick="document.getElementById('frame-result').textContent='Button clicked inside frame!'">
        Click Me (Inside Frame)
    </button>
    <p id="frame-result" class="mt-2 text-success fw-bold"></p>
    <input type="text" class="form-control mt-2" id="frame-input" placeholder="Type inside frame">
</body>
</html>
