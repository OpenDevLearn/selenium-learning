<!DOCTYPE html>
<html>
<head>
    <title>Nested Frame</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-3">
    <h4 id="outer-frame-title">Outer Frame</h4>
    <p id="outer-frame-text">This is the outer frame. There is a nested frame below.</p>
    <iframe src="/frame-content" id="inner-frame" name="inner-frame"
            width="100%" height="200" class="border"></iframe>
</body>
</html>
