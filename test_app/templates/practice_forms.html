{% extends "base.html" %}
{% block title %}Practice Forms{% endblock %}
{% block content %}
<h2 id="forms-title">Practice Forms</h2>
<p class="text-muted">This page contains various form elements for practice.</p>

<form method="POST" action="/submit-form" id="practice-form">
    <div class="row">
        <!-- Text Inputs -->
        <div class="col-md-6 mb-3">
            <label for="first_name" class="form-label">First Name</label>
            <input type="text" class="form-control" id="first_name" name="first_name"
                   placeholder="Enter first name" required>
        </div>
        <div class="col-md-6 mb-3">
            <label for="last_name" class="form-label">Last Name</label>
            <input type="text" class="form-control" id="last_name" name="last_name"
                   placeholder="Enter last name" required>
        </div>
    </div>

    <!-- Email -->
    <div class="mb-3">
        <label for="email" class="form-label">Email Address</label>
        <input type="email" class="form-control" id="email" name="email"
               placeholder="name@example.com" required>
    </div>

    <!-- Date of Birth -->
    <div class="mb-3">
        <label for="dob" class="form-label">Date of Birth</label>
        <input type="date" class="form-control" id="dob" name="dob">
    </div>

    <!-- Radio Buttons -->
    <div class="mb-3">
        <label class="form-label">Gender</label><br>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="gender" id="gender-male" value="Male">
            <label class="form-check-label" for="gender-male">Male</label>
        </div>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="gender" id="gender-female" value="Female">
            <label class="form-check-label" for="gender-female">Female</label>
        </div>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="radio" name="gender" id="gender-other" value="Other">
            <label class="form-check-label" for="gender-other">Other</label>
        </div>
    </div>

    <!-- Checkboxes -->
    <div class="mb-3">
        <label class="form-label">Hobbies</label><br>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" name="hobbies" id="hobby-reading" value="Reading">
            <label class="form-check-label" for="hobby-reading">Reading</label>
        </div>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" name="hobbies" id="hobby-sports" value="Sports">
            <label class="form-check-label" for="hobby-sports">Sports</label>
        </div>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" name="hobbies" id="hobby-music" value="Music">
            <label class="form-check-label" for="hobby-music">Music</label>
        </div>
        <div class="form-check form-check-inline">
            <input class="form-check-input" type="checkbox" name="hobbies" id="hobby-travel" value="Travel">
            <label class="form-check-label" for="hobby-travel">Travel</label>
        </div>
    </div>

    <!-- Dropdown -->
    <div class="mb-3">
        <label for="country" class="form-label">Country</label>
        <select class="form-select" id="country" name="country">
            <option value="">-- Select Country --</option>
            <option value="India">India</option>
            <option value="USA">USA</option>
            <option value="UK">UK</option>
            <option value="Canada">Canada</option>
            <option value="Australia">Australia</option>
            <option value="Germany">Germany</option>
            <option value="Japan">Japan</option>
        </select>
    </div>

    <!-- Range Slider -->
    <div class="mb-3">
        <label for="experience" class="form-label">Years of Experience: <span id="experience-value">0</span></label>
        <input type="range" class="form-range" id="experience" name="experience" min="0" max="20" value="0"
               oninput="document.getElementById('experience-value').textContent = this.value">
    </div>

    <!-- Color Picker -->
    <div class="mb-3">
        <label for="color" class="form-label">Favorite Color</label>
        <input type="color" class="form-control form-control-color" id="color" name="color" value="#563d7c">
    </div>

    <!-- Textarea -->
    <div class="mb-3">
        <label for="message" class="form-label">Message</label>
        <textarea class="form-control" id="message" name="message" rows="4"
                  placeholder="Type your message here..."></textarea>
    </div>

    <!-- Terms Checkbox -->
    <div class="mb-3 form-check">
        <input type="checkbox" class="form-check-input" id="agree_terms" name="agree_terms">
        <label class="form-check-label" for="agree_terms">I agree to the terms and conditions</label>
    </div>

    <!-- Hidden Field -->
    <input type="hidden" id="form_source" name="form_source" value="practice_page">

    <!-- Disabled Field -->
    <div class="mb-3">
        <label for="disabled-field" class="form-label">Disabled Field</label>
        <input type="text" class="form-control" id="disabled-field" value="This field is disabled" disabled>
    </div>

    <!-- Read-only Field -->
    <div class="mb-3">
        <label for="readonly-field" class="form-label">Read-only Field</label>
        <input type="text" class="form-control" id="readonly-field" value="This field is read-only" readonly>
    </div>

    <button type="submit" class="btn btn-primary" id="submit-btn">Submit Form</button>
    <button type="reset" class="btn btn-secondary ms-2" id="reset-btn">Reset</button>
</form>
{% endblock %}
