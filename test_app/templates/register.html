{% extends "base.html" %}
{% block title %}Register{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <h2 class="text-center mb-4" id="register-title">Create Account</h2>
        {% if error %}
        <div class="alert alert-danger" id="register-error">{{ error }}</div>
        {% endif %}
        {% if success %}
        <div class="alert alert-success" id="register-success">{{ success }}</div>
        {% endif %}
        <form method="POST" action="/register" id="register-form">
            <div class="mb-3">
                <label for="full_name" class="form-label">Full Name</label>
                <input type="text" class="form-control" id="full_name" name="full_name"
                       placeholder="Enter your full name" required>
            </div>
            <div class="mb-3">
                <label for="username" class="form-label">Username</label>
                <input type="text" class="form-control" id="username" name="username"
                       placeholder="Choose a username" required>
            </div>
            <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email"
                       placeholder="Enter your email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input type="password" class="form-control" id="password" name="password"
                       placeholder="Create a password" minlength="6" required>
            </div>
            <div class="mb-3">
                <label for="confirm_password" class="form-label">Confirm Password</label>
                <input type="password" class="form-control" id="confirm_password" name="confirm_password"
                       placeholder="Confirm your password" required>
            </div>
            <button type="submit" class="btn btn-success w-100" id="register-btn">Register</button>
        </form>
        <p class="text-center mt-3">
            Already have an account? <a href="/login" id="login-link">Login here</a>
        </p>
    </div>
</div>
{% endblock %}
